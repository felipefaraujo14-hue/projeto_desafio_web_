<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Questão 5</title>
</head>
<body>
    <script>
        let lado1 = Number(prompt("Digite o primeiro lado:"));
        let lado2 = Number(prompt("Digite o segundo lado:"));
        let lado3 = Number(prompt("Digite o terceiro lado:"));

        if (lado1 === lado2 && lado2 === lado3) {
            alert("O triângulo é equilátero");
        } else if (lado1 === lado2 || lado1 === lado3 || lado2 === lado3) {
            alert("O triângulo é isósceles");
        } else {
            alert("O triângulo é escaleno");
        }
    </script>
</body>
</html>
