<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Calculadora de Venda</title>
  <link rel="stylesheet" href="css/questao9.css">
</head>
<body>

  <h2>Calculadora de preço de venda</h2>

  <form id="formProduto">
    <label>Nome do Produto:</label><br>
    <input type="text" id="nome" required><br><br>

    <label>Valor de compra (R$):</label><br>
    <input type="number" id="valorCompra" step="0.01" required><br><br>

    <button type="submit">Calcular venda</button>
  </form>

  <h3>Resultado:</h3>
  <p id="resultado"></p>

  <script src="js/questao9.js"></script>

</body>
</html>
