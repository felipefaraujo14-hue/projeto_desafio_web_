<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculo de IMC</title>
    <link rel="stylesheet" href="css/questao6.css">
</head>
<body>

    <h2>Calculadora de IMC</h2>

    <form>
        <label for="nome">Nome do paciente:</label>
        <input type="text" id="nome" required>
        <br><br>

        <label for="peso">Peso (kg):</label>
        <input type="number" id="peso" step="any" required>
        <br><br>

        <label for="altura">Altura (m):</label>
        <input type="number" id="altura" step="0.01" required>
        <br><br>

        <button type="button" onclick="calcularIMC()">
            Calcular IMC
        </button>
    </form>

    <h3 id="resultado"></h3>

    <script src="js/questao6.js"></script>

</body>
</html>
