<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculo de Combustível</title>
</head>
<body>

    <h2>Calcular Gasto de Combustível</h2>

    <form>
        <label for="distancia">Distância (km):</label>
        <input type="number" id="distancia" step="any" required>
        <br><br>

        <label for="consumo">Consumo do veículo (km/l):</label>
        <input type="number" id="consumo" step="any" required>
        <br><br>

        <label for="preco">Preço do combustível (R$/l):</label>
        <input type="number" id="preco" step="any" required>
        <br><br>

        <button type="button" onclick="calcularCombustivel()">
            Calcular
        </button>
    </form>

    <h3 id="resultado"></h3>

    <script src="js/questao3.js"></script>

</body>
</html>
